<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Photography - Dark Theme Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Stone Photography</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Welcome to Stone Photography</h2>
            <p>Capturing moments in the shadows.</p>
        </section>
        <section id="gallery">
            <h2>Gallery</h2>
            <div class="gallery">
                <img src="placeholder1.jpg" alt="Photo 1">
                <img src="placeholder2.jpg" alt="Photo 2">
                <img src="placeholder3.jpg" alt="Photo 3">
                <img src="placeholder4.jpg" alt="Photo 4">
                <img src="placeholder5.jpg" alt="Photo 5">
                <img src="placeholder6.jpg" alt="Photo 6">
            </div>
        </section>
        <section id="about">
            <h2>About</h2>
            <p>Beginner Photographer</p>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <p>Email: info@stonephotography.com</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Stone Photography. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
