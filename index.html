<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Photography - Dark Theme Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#" style="font-family: 'Permanent Marker', cursive;">Stone Photography</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#gallery">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5">
        <section id="home" class="text-center mb-5">
            <h2>Welcome to Stone Photography</h2>
        </section>
        <section id="gallery" class="mb-5">
            <h2 class="text-center mb-4">Gallery</h2>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <img src="placeholder1.jpg" alt="Photo 1" class="img-fluid rounded">
                </div>
                <div class="col-md-4 mb-3">
                    <img src="placeholder2.jpg" alt="Photo 2" class="img-fluid rounded">
                </div>
                <div class="col-md-4 mb-3">
                    <img src="placeholder3.jpg" alt="Photo 3" class="img-fluid rounded">
                </div>
                <div class="col-md-4 mb-3">
                    <img src="placeholder4.jpg" alt="Photo 4" class="img-fluid rounded">
                </div>
                <div class="col-md-4 mb-3">
                    <img src="placeholder5.jpg" alt="Photo 5" class="img-fluid rounded">
                </div>
                <div class="col-md-4 mb-3">
                    <img src="placeholder6.jpg" alt="Photo 6" class="img-fluid rounded">
                </div>
            </div>
        </section>
        <section id="about" class="text-center mb-5">
            <h2>About</h2>
            <p>Beginner Photographer</p>
        </section>
        <section id="contact" class="text-center mb-5">
            <h2>Contact</h2>
            <p>Email: info@stonephotography.com</p>
        </section>
    </main>
    <footer class="bg-dark text-center py-3">
        <p class="mb-0">&copy; 2026 Stone Photography. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
